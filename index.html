// 格式化数字（1234567 → 123.4万）
function formatNumber(num) {
  if (num >= 10000) return (num / 10000).toFixed(1) + '万';
  return num.toLocaleString();
}

// 延时函数（用于模拟加载效果）
function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// --------------------------------------------------------
// API 模块：数据获取（通过后端代理调用 Apify）
// --------------------------------------------------------
async function fetchTikTokVideos(keyword, onProgress) {
  onProgress("正在启动爬虫，搜索关键词: " + keyword);

  // 调用我们自己的后端接口，后端会代理 Apify（API Key 安全地存在服务器 .env 里）
  const response = await fetch("/api/scrape", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ keyword, resultsPerPage: 20 }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({ error: "请求失败" }));
    throw new Error(err.error || `数据获取失败 (${response.status})`);
  }

  const items = await response.json();

  // 转换数据格式，按播放量排序（数据清洗逻辑保留在前端）
  const videos = items
    .map(item => ({
      id: item.id || item.videoId || Math.random().toString(36).substr(2, 9),
      desc: item.text || item.desc || "",
      plays: item.playCount || item.plays || 0,
      likes: item.diggCount || item.likes || 0,
      comments: item.commentCount || item.comments || 0,
      shares: item.shareCount || item.shares || 0,
      author: item.authorMeta?.name || item.author || "未知",
      coverUrl: item.covers?.default || item.coverUrl || "",
      videoUrl: item.videoUrl || item.videoMeta?.downloadAddr || "",
      transcript: "", // 后续由转录模块填充
    }))
    .sort((a, b) => b.plays - a.plays);

  onProgress(`成功获取 ${videos.length} 个视频`);
  return videos;
}

// --------------------------------------------------------
// API 模块：语音转录（通过后端代理调用 Groq Whisper）
// --------------------------------------------------------
async function transcribeVideos(videos, topN, onProgress) {
  // 只转录播放量最高的 topN 个视频
  const toTranscribe = videos.slice(0, topN);
  const results = [...videos]; // 拷贝数组

  for (let i = 0; i < toTranscribe.length; i++) {
    const video = toTranscribe[i];
    onProgress(`正在转录第 ${i + 1}/${toTranscribe.length} 个视频...`);

    if (!video.videoUrl) {
      onProgress(`第 ${i + 1} 个视频没有下载链接，跳过`);
      continue;
    }

    try {
      // 把视频 URL 发给后端，后端负责下载视频并转录（不暴露 API Key）
      const response = await fetch("/api/transcribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ videoUrl: video.videoUrl, filename: `video_${i}.mp4` }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: "转录失败" }));
        throw new Error(err.error || "转录失败");
      }

      const transcriptData = await response.json();

      // 把转录结果写入对应视频对象
      const idx = results.findIndex(v => v.id === video.id);
      if (idx !== -1) {
        results[idx] = { ...results[idx], transcript: transcriptData.text || "" };
      }

      onProgress(`视频 ${i + 1} 转录完成 ✓`);
    } catch (err) {
      onProgress(`视频 ${i + 1} 转录失败: ${err.message}`);
      console.error("转录错误:", err);
    }
  }

  return results;
}

// --------------------------------------------------------
// API 模块：爆款分析（通过后端代理调用 DeepSeek）
// --------------------------------------------------------
async function analyzeVideos(videos, onProgress) {
  onProgress("正在让 AI 分析爆款规律...");

  // 构建视频数据文本，传给 DeepSeek
  const videoListText = videos.slice(0, 10).map((v, i) => {
    let entry = `视频${i + 1}：
- 作者：${v.author}
- 文案：${v.desc}
- 播放量：${formatNumber(v.plays)} | 点赞：${formatNumber(v.likes)} | 评论：${formatNumber(v.comments)} | 转发：${formatNumber(v.shares)}`;
    if (v.transcript) {
      entry += `\n- 口播内容：${v.transcript}`;
    }
    return entry;
  }).join("\n\n");

  const prompt = `你是一个 TikTok 短视频爆款分析专家。我给你一组同一关键词下的热门视频数据（包含文案和口播转录内容），请分析这些爆款的共同规律。

以下是视频数据：
${videoListText}

请严格按以下 JSON 格式返回分析结果（不要包含 markdown 代码块标记，直接返回 JSON）：
{
  "hookTypes": [
    {"type": "Hook类型名称", "percentage": 占比数字, "example": "具体例子"}
  ],
  "contentStructure": {
    "avgDuration": "平均时长范围",
    "pattern": "内容结构模式",
    "keyElements": ["关键元素1", "关键元素2"]
  },
  "emotionalTriggers": ["情绪触发点1", "情绪触发点2"],
  "targetAudience": "目标受众描述",
  "commonHashtags": ["#标签1", "#标签2"],
  "bestPostingTime": "建议发布时间",
  "viralFactors": ["爆款因素1", "爆款因素2"]
}

重点分析：
1. 开头 Hook 是怎么抓住注意力的（如果有口播内容，重点分析口播的前两句话）
2. 内容是怎么组织的（总分总？步骤式？故事型？）
3. 用了什么情绪策略（恐惧、好奇、贪婪、共鸣？）
4. 为什么这些视频能火（数据背后的逻辑）`;

  // 调用后端统一的 /api/chat 接口（后端会加上 API Key 和 model）
  const response = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: [
        { role: "system", content: "你是短视频爆款分析专家，请直接返回 JSON 格式的分析结果，不要包含 markdown 代码块标记。" },
        { role: "user", content: prompt },
      ],
      temperature: 0.7,
      max_tokens: 2000,
    }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({ error: "请求失败" }));
    throw new Error(err.error || `分析请求失败 (${response.status})`);
  }

  const data = await response.json();
  const content = data.choices?.[0]?.message?.content || "";

  // 尝试从返回内容中解析 JSON
  let analysis;
  try {
    analysis = JSON.parse(content);
  } catch (e) {
    const jsonMatch = content.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (jsonMatch) {
      analysis = JSON.parse(jsonMatch[1].trim());
    } else {
      const start = content.indexOf('{');
      const end = content.lastIndexOf('}');
      if (start !== -1 && end !== -1) {
        analysis = JSON.parse(content.substring(start, end + 1));
      } else {
        throw new Error("无法解析 AI 返回的分析结果");
      }
    }
  }

  onProgress("分析完成 ✓");
  return analysis;
}

注意：
- 脚本要口语化，像在跟朋友聊天，不要书面语
- 多用数字、对比、具体案例增加可信度
- Hook 要让人不忍心划走
- 三条脚本风格要有明显区别（比如一条揭秘型、一条教程型、一条故事型）`;

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: [
        { role: "system", content: "你是顶级短视频脚本写手，请直接返回 JSON 格式的脚本，不要包含 markdown 代码块标记。" },
        { role: "user", content: prompt },
      ],
      temperature: 0.9,
      max_tokens: 3000,
    }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({ error: "请求失败" }));
    throw new Error(err.error || `脚本生成失败 (${response.status})`);
  }

  const data = await response.json();
  const content = data.choices?.[0]?.message?.content || "";

  let scripts;
  try {
    scripts = JSON.parse(content);
  } catch (e) {
    const jsonMatch = content.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (jsonMatch) {
      scripts = JSON.parse(jsonMatch[1].trim());
    } else {
      const start = content.indexOf('[');
      const end = content.lastIndexOf(']');
      if (start !== -1 && end !== -1) {
        scripts = JSON.parse(content.substring(start, end + 1));
      } else {
        throw new Error("无法解析 AI 返回的脚本");
      }
    }
  }

  onProgress("脚本生成完成 ✓");
  return scripts;
}

async function generateA2EVideo(scriptText, onProgress) {
  onProgress("正在生成数字人视频...");

  // 后端会处理创建任务 + 轮询等待完成的全过程
  const response = await fetch("/api/video", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      text: scriptText,
      voice: "zh-CN-XiaoxiaoNeural",
      aspectRatio: "9:16",
    }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({ error: "请求失败" }));
    throw new Error(err.error || `视频生成失败 (${response.status})`);
  }

  const data = await response.json();
  onProgress("数字人视频生成完成 ✓");
  return data.url;
}

function App() {
  // 状态管理
  const [keyword, setKeyword] = useState("");
  const [isDemo, setIsDemo] = useState(true); // 默认演示模式
  const [serverStatus, setServerStatus] = useState(null); // 服务器 API Key 配置状态

  // 页面加载时检查服务器状态（看看哪些 API Key 已配置）
  useEffect(() => {
    fetch("/api/health")
      .then(r => r.json())
      .then(data => setServerStatus(data.keys))
      .catch(() => setServerStatus(null));
  }, []);

  // 流水线状态
  const [isRunning, setIsRunning] = useState(false);
  const [currentStep, setCurrentStep] = useState(-1); // -1 表示未开始
  const [statusMsg, setStatusMsg] = useState("");
  const [error, setError] = useState("");

  // 各模块输出数据
  const [videos, setVideos] = useState(null);
  const [analysis, setAnalysis] = useState(null);
  const [scripts, setScripts] = useState(null);
  const [generatingVideo, setGeneratingVideo] = useState(false);
  const [generatedVideoUrl, setGeneratedVideoUrl] = useState("");
  const [previewScript, setPreviewScript] = useState(null);

  // 当前展示的 Tab
  const [activeTab, setActiveTab] = useState("videos"); // videos | analysis | scripts | video

  const steps = ["抓取数据", "语音转录", "AI 分析", "生成脚本", "视频生成"];

  // 运行完整流水线
  const runPipeline = async () => {
    if (!keyword.trim()) {
      setError("请输入关键词");
      return;
    }

    // 真实模式下检查服务器 API Key 状态
    if (!isDemo) {
      if (!serverStatus?.apify) { setError("服务器未配置 APIFY_TOKEN，请检查 .env 文件"); return; }
      if (!serverStatus?.deepseek) { setError("服务器未配置 DEEPSEEK_API_KEY，请检查 .env 文件"); return; }
    }

    setIsRunning(true);
    setError("");
    setCurrentStep(0);
    setVideos(null);
    setAnalysis(null);
    setScripts(null);
    setGeneratedVideoUrl("");
    setPreviewScript(null);
    setActiveTab("videos");

    try {
      // ===== Step 1: 数据获取 =====
      setStatusMsg("正在获取 TikTok 热门视频...");
      let videoData;

      if (isDemo) {
        // 演示模式：使用 mock 数据
        await delay(1500);
        videoData = MOCK_VIDEOS;
        setStatusMsg(`演示模式：加载了 ${videoData.length} 个示例视频`);
      } else {
        // 真实模式：通过后端代理调用 Apify
        videoData = await fetchTikTokVideos(keyword, setStatusMsg);
      }

      setVideos(videoData);
      setCurrentStep(1);

      // ===== Step 2: 语音转录 =====
      setStatusMsg("正在转录视频口播内容...");

      if (isDemo) {
        // 演示模式：mock 数据已包含 transcript
        await delay(2000);
        setStatusMsg("演示模式：口播内容已就绪");
      } else if (serverStatus?.groq) {
        // 服务器配置了 Groq Key 才转录
        videoData = await transcribeVideos(videoData, 5, setStatusMsg);
        setVideos(videoData);
      } else {
        setStatusMsg("服务器未配置 GROQ_API_KEY，跳过转录步骤");
        await delay(500);
      }

      setCurrentStep(2);

      // ===== Step 3: 爆款分析 =====
      setStatusMsg("AI 正在分析爆款规律...");
      let analysisData;

      if (isDemo) {
        await delay(2000);
        analysisData = MOCK_ANALYSIS;
        setStatusMsg("演示模式：分析报告已就绪");
      } else {
        analysisData = await analyzeVideos(videoData, setStatusMsg);
      }

      setAnalysis(analysisData);
      setActiveTab("analysis");
      setCurrentStep(3);

      // ===== Step 4: 脚本生成 =====
      setStatusMsg("正在生成脚本...");
      let scriptsData;

      if (isDemo) {
        await delay(1500);
        scriptsData = MOCK_SCRIPTS;
        setStatusMsg("演示模式：3 条脚本已就绪");
      } else {
        scriptsData = await generateScripts(analysisData, keyword, setStatusMsg);
      }

      setScripts(scriptsData);
      setActiveTab("scripts");
      setCurrentStep(4);
      setStatusMsg("流水线完成！🎉");

    } catch (err) {
      setError(err.message);
      setStatusMsg("流水线出错，请查看错误信息");
      console.error("Pipeline error:", err);
    } finally {
      setIsRunning(false);
    }
  };

  // 生成视频（A2E 或预览）
  const handleGenerateVideo = async (scriptText) => {
    setActiveTab("video");
    setPreviewScript(scripts?.find(s => `${s.hook}\n\n${s.body}\n\n${s.cta}` === scriptText) || scripts?.[0]);

    if (isDemo || !serverStatus?.a2e) {
      // 预览模式
      setGeneratedVideoUrl("");
      return;
    }

    // 真实 A2E 调用（通过后端代理）
    setGeneratingVideo(true);
    try {
      const url = await generateA2EVideo(scriptText, setStatusMsg);
      setGeneratedVideoUrl(url);
    } catch (err) {
      setError("视频生成失败: " + err.message);
    } finally {
      setGeneratingVideo(false);
    }
  };

  return (
    <div className="max-w-6xl mx-auto px-4 py-8">
      {/* Header */}
      <header className="text-center mb-8">
        <h1 className="text-4xl font-bold mb-2">
          <span className="text-tt-cyan">TikTok</span>
          <span className="text-white"> 爆款内容引擎</span>
        </h1>
        <p className="text-gray-400 text-sm">关键词 → 抓取爆款 → AI 分析 → 生成脚本 → 数字人视频</p>
      </header>

      {/* 设置面板 */}
      <SettingsPanel isDemo={isDemo} setIsDemo={setIsDemo} serverStatus={serverStatus} />

      {/* 搜索框 */}
      <div className="flex gap-3 mb-6">
        <input
          type="text"
          value={keyword}
          onChange={e => setKeyword(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && !isRunning && runPipeline()}
          placeholder="输入关键词，如：眼镜、护肤、健身..."
          className="flex-1 bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none"
          disabled={isRunning}
        />
        <button
          onClick={runPipeline}
          disabled={isRunning}
          className="bg-tt-pink hover:bg-tt-pink/80 text-white px-6 py-3 rounded-xl font-bold transition disabled:opacity-50 disabled:cursor-not-allowed whitespace-nowrap"
        >
          {isRunning ? '⏳ 运行中...' : '🚀 开始分析'}
        </button>
      </div>

      {/* 错误提示 */}
      {error && (
        <div className="bg-red-900/30 border border-red-700 text-red-300 px-4 py-3 rounded-xl mb-6 text-sm">
          ❌ {error}
          <button onClick={() => setError("")} className="float-right text-red-400 hover:text-red-200">✕</button>
        </div>
      )}

      {/* 进度条 */}
      {currentStep >= 0 && (
        <div>
          <ProgressSteps steps={steps} currentStep={currentStep} />
          {statusMsg && (
            <p className="text-center text-sm text-gray-400 mb-6">{statusMsg}</p>
          )}
        </div>
      )}

      {/* Tab 切换 */}
      {(videos || analysis || scripts) && (
        <div className="flex gap-1 mb-6 bg-gray-800/30 p-1 rounded-xl">
          {[
            { key: "videos", label: "📊 爆款视频", show: !!videos },
            { key: "analysis", label: "🧠 分析报告", show: !!analysis },
            { key: "scripts", label: "📝 生成脚本", show: !!scripts },
            { key: "video", label: "🎬 视频预览", show: !!previewScript },
          ].filter(t => t.show).map(tab => (
            <button
              key={tab.key}
              onClick={() => setActiveTab(tab.key)}
              className={`flex-1 py-2 px-4 rounded-lg text-sm font-medium transition ${
                activeTab === tab.key
                  ? 'bg-indigo-600 text-white'
                  : 'text-gray-400 hover:text-white hover:bg-gray-700/50'
              }`}
            >
              {tab.label}
            </button>
          ))}
        </div>
      )}

      {/* 内容区域 */}
      <div className="min-h-[400px]">
        {/* 视频列表 */}
        {activeTab === "videos" && videos && (
          <div>
            <h2 className="text-xl font-bold mb-4">
              📊 热门视频 <span className="text-sm text-gray-400 font-normal">（共 {videos.length} 个，按播放量排序）</span>
            </h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {videos.map((video, i) => (
                <VideoCard key={video.id} video={video} index={i} />
              ))}
            </div>
          </div>
        )}

        {/* 分析报告 */}
        {activeTab === "analysis" && analysis && (
          <div>
            <h2 className="text-xl font-bold mb-4">🧠 爆款分析报告</h2>
            <AnalysisReport analysis={analysis} />
          </div>
        )}

        {/* 脚本展示 */}
        {activeTab === "scripts" && scripts && (
          <div>
            <h2 className="text-xl font-bold mb-4">📝 生成的脚本</h2>
            <div className="space-y-4">
              {scripts.map(script => (
                <ScriptCard
                  key={script.id}
                  script={script}
                  onGenerate={handleGenerateVideo}
                  isGenerating={generatingVideo}
                />
              ))}
            </div>
          </div>
        )}

        {/* 视频预览 */}
        {activeTab === "video" && previewScript && (
          <div>
            <h2 className="text-xl font-bold mb-4">🎬 视频预览</h2>
            <div className="flex flex-col md:flex-row gap-8 items-start justify-center">
              <PhonePreview script={previewScript} />
              <div className="flex-1 max-w-md">
                <h3 className="text-white font-bold mb-2">{previewScript.title}</h3>
                <div className="bg-gray-800/50 rounded-xl p-4 border border-gray-700/50 space-y-3">
                  <div>
                    <p className="text-xs text-tt-pink font-bold mb-1">🎣 Hook</p>
                    <p className="text-sm text-gray-300">{previewScript.hook}</p>
                  </div>
                  <div>
                    <p className="text-xs text-gray-400 font-bold mb-1">📝 正文</p>
                    <p className="text-sm text-gray-300 leading-relaxed">{previewScript.body}</p>
                  </div>
                  <div>
                    <p className="text-xs text-green-400 font-bold mb-1">📢 CTA</p>
                    <p className="text-sm text-gray-300">{previewScript.cta}</p>
                  </div>
                </div>
                {generatedVideoUrl && (
                  <div className="mt-4">
                    <a href={generatedVideoUrl} target="_blank" rel="noopener noreferrer"
                       className="inline-block bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-lg text-sm transition">
                      ⬇️ 下载数字人视频
                    </a>
                  </div>
                )}
                {!generatedVideoUrl && !isDemo && serverStatus?.a2e && (
                  <p className="text-xs text-gray-500 mt-3">💡 点击脚本卡片上的"生成视频"按钮，使用 A2E 数字人生成真实视频</p>
                )}
                {(isDemo || !serverStatus?.a2e) && (
                  <p className="text-xs text-gray-500 mt-3">💡 当前为图文预览模式。配置 A2E API Key 后可生成数字人视频</p>
                )}
              </div>
            </div>
          </div>
        )}

        {/* 空状态 */}
        {currentStep < 0 && (
          <div className="text-center py-20">
            <div className="text-6xl mb-4">🎯</div>
            <p className="text-gray-400 text-lg mb-2">输入关键词，开始分析 TikTok 爆款</p>
            <p className="text-gray-500 text-sm">默认为演示模式，无需 API Key 即可体验完整流程</p>
          </div>
        )}
      </div>

      {/* Footer */}
      <footer className="text-center text-gray-600 text-xs mt-12 py-4 border-t border-gray-800">
        TikTok 爆款内容引擎 — Demo Version | 数据来源: Apify | AI: DeepSeek | 转录: Groq Whisper
      </footer>
    </div>
  );
}

// 渲染应用
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
